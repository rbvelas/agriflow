# ════════════════════════════════════════════════════════════════════
# AgriFlow — Docker Compose (desarrollo local)
# Inicio: docker compose up -d
# ════════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL 16 ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: agriflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-agriflow}
      POSTGRES_USER:     ${POSTGRES_USER:-agriflow_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requerido}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Script de inicialización — crea el esquema y datos semilla
      - ./backend/sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agriflow_user} -d ${POSTGRES_DB:-agriflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: agriflow_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── ML Service (FastAPI) ─────────────────────────────────────────
  ml-service:
    build:
      context: .
      dockerfile: ml-service/Dockerfile
    container_name: agriflow_ml
    restart: unless-stopped
    environment:
      ML_MODEL_PATH: ${ML_MODEL_PATH:-/app/model/ensemble_v1.pkl}
    ports:
      - "8000:8000"
    volumes:
      - ml_models:/app/model
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s  # tiempo para entrenar el modelo al inicio

  # ── Backend NestJS ───────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: production
    container_name: agriflow_backend
    restart: unless-stopped
    environment:
      NODE_ENV:            production
      PORT:                3001
      POSTGRES_HOST:       postgres
      POSTGRES_PORT:       5432
      POSTGRES_DB:         ${POSTGRES_DB:-agriflow}
      POSTGRES_USER:       ${POSTGRES_USER:-agriflow_user}
      POSTGRES_PASSWORD:   ${POSTGRES_PASSWORD}
      REDIS_URL:           redis://redis:6379
      JWT_SECRET:          ${JWT_SECRET:?JWT_SECRET requerido}
      JWT_EXPIRES_IN:      ${JWT_EXPIRES_IN:-7d}
      ML_SERVICE_URL:      http://ml-service:8000
      N8N_WEBHOOK_SECRET:  ${N8N_WEBHOOK_SECRET:?N8N_WEBHOOK_SECRET requerido}
      FRONTEND_URL:        http://localhost:3000
    ports:
      - "3001:3001"
    volumes:
      - reportes_pdf:/app/reportes_pdf
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/api/auth/health 2>/dev/null || wget -q -O- http://localhost:3001/trpc/sensores.ultimasLecturas 2>/dev/null | grep -q data || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── n8n (self-hosted) ───────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: agriflow_n8n
    restart: unless-stopped
    environment:
      N8N_BASIC_AUTH_ACTIVE:   "true"
      N8N_BASIC_AUTH_USER:     ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:?N8N password requerido}
      N8N_HOST:                ${N8N_HOST:-localhost}
      N8N_PORT:                5678
      N8N_PROTOCOL:            http
      WEBHOOK_URL:             ${WEBHOOK_URL:-http://n8n:5678}
      # n8n usa la misma BD de PostgreSQL en el schema 'n8n'
      DB_TYPE:                 postgresdb
      DB_POSTGRESDB_HOST:      postgres
      DB_POSTGRESDB_PORT:      5432
      DB_POSTGRESDB_DATABASE:  ${POSTGRES_DB:-agriflow}
      DB_POSTGRESDB_USER:      ${POSTGRES_USER:-agriflow_user}
      DB_POSTGRESDB_PASSWORD:  ${POSTGRES_PASSWORD}
      DB_POSTGRESDB_SCHEMA:    n8n
      # Variables de entorno disponibles en los workflows
      N8N_WEBHOOK_SECRET:      ${N8N_WEBHOOK_SECRET}
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/home/node/workflows:ro
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started

  # ── Frontend Next.js ────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL:  http://localhost:3001
        NEXT_PUBLIC_APP_NAME: AgriFlow
    container_name: agriflow_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      PORT: 3000

volumes:
  postgres_data:
  redis_data:
  n8n_data:
  ml_models:
  reportes_pdf:

networks:
  default:
    name: agriflow_net
